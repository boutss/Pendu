<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Pendu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header>
      <h1>🪢 Le Pendu</h1>
      <div class="score-board">
        <span class="score-item">Score : <strong id="score">0</strong></span>
        <span class="score-item">Série : <strong id="streak">0</strong></span>
        <span class="score-item">Meilleur : <strong id="best">0</strong></span>
      </div>
    </header>

    <!-- Setup Screen -->
    <div id="setup-screen" class="screen active">
      <h2>Nouvelle partie</h2>

      <div class="form-group">
        <label>Ton pseudo</label>
        <input type="text" id="pseudo-input" class="pseudo-input" placeholder="Entre ton pseudo..." maxlength="20" />
      </div>

      <div class="form-group">
        <label>Catégorie</label>
        <div class="btn-group" id="category-group">
          <button class="choice-btn active" data-value="all">Toutes</button>
          <button class="choice-btn" data-value="animaux">Animaux</button>
          <button class="choice-btn" data-value="pays">Pays</button>
          <button class="choice-btn" data-value="sports">Sports</button>
          <button class="choice-btn" data-value="films">Films</button>
          <button class="choice-btn" data-value="aliments">Aliments</button>
          <button class="choice-btn" data-value="celebrites">Célébrités</button>
        </div>
      </div>

      <div class="form-group">
        <label>Difficulté</label>
        <div class="btn-group" id="difficulty-group">
          <button class="choice-btn active" data-value="facile">Facile</button>
          <button class="choice-btn" data-value="moyen">Moyen</button>
          <button class="choice-btn" data-value="difficile">Difficile</button>
        </div>
      </div>

      <button class="btn-primary" id="start-btn">Commencer</button>

      <div class="high-scores">
        <div class="scores-tabs">
          <button class="tab-btn active" data-tab="local">Mes scores</button>
          <button class="tab-btn" data-tab="global">Classement mondial</button>
        </div>
        <div id="tab-local">
          <ol id="high-scores-list"></ol>
        </div>
        <div id="tab-global" class="hidden">
          <div id="global-scores-list"><span class="loading">Chargement...</span></div>
        </div>
      </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
      <div class="game-info">
        <span class="badge" id="category-badge"></span>
        <span class="badge" id="difficulty-badge"></span>
        <button class="btn-small" id="quit-btn">Quitter</button>
      </div>

      <!-- SVG Hangman -->
      <div class="gallows-container">
        <svg id="gallows" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
          <!-- Structure fixe -->
          <line x1="10" y1="210" x2="190" y2="210" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
          <line x1="40" y1="210" x2="40" y2="10" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
          <line x1="40" y1="10" x2="130" y2="10" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
          <line x1="130" y1="10" x2="130" y2="35" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
          <!-- Corps du pendu (caché au départ) -->
          <circle id="head"   cx="130" cy="50" r="15" fill="none" stroke="currentColor" stroke-width="3" class="body-part hidden"/>
          <line   id="body"   x1="130" y1="65" x2="130" y2="130" stroke="currentColor" stroke-width="3" stroke-linecap="round" class="body-part hidden"/>
          <line   id="arm-l"  x1="130" y1="80" x2="100" y2="110" stroke="currentColor" stroke-width="3" stroke-linecap="round" class="body-part hidden"/>
          <line   id="arm-r"  x1="130" y1="80" x2="160" y2="110" stroke="currentColor" stroke-width="3" stroke-linecap="round" class="body-part hidden"/>
          <line   id="leg-l"  x1="130" y1="130" x2="100" y2="170" stroke="currentColor" stroke-width="3" stroke-linecap="round" class="body-part hidden"/>
          <line   id="leg-r"  x1="130" y1="130" x2="160" y2="170" stroke="currentColor" stroke-width="3" stroke-linecap="round" class="body-part hidden"/>
        </svg>
        <div class="lives-display">
          <span id="lives-count">❤️</span>
        </div>
      </div>

      <!-- Mot à deviner -->
      <div class="word-container">
        <div id="word-display"></div>
        <div class="hint-text" id="hint-text"></div>
      </div>

      <!-- Lettres déjà essayées -->
      <div class="tried-section">
        <span class="tried-label">Essayées :</span>
        <span id="tried-letters"></span>
      </div>

      <!-- Clavier -->
      <div id="keyboard"></div>
    </div>

    <!-- Screamer overlay -->
    <div id="screamer" class="screamer hidden">
      <img src="screamer.png?v=2" alt="" id="screamer-img" />
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="screen">
      <div class="result-card" id="result-card">
        <div class="result-icon" id="result-icon"></div>
        <h2 id="result-title"></h2>
        <p id="result-message"></p>
        <div class="result-stats">
          <div class="stat"><span id="stat-word-label">Mot</span><strong id="stat-word"></strong></div>
          <div class="stat"><span>Points</span><strong id="stat-points"></strong></div>
          <div class="stat"><span>Série</span><strong id="stat-streak"></strong></div>
        </div>
        <div class="result-actions">
          <button class="btn-primary" id="next-btn">Mot suivant</button>
          <button class="btn-secondary" id="menu-btn">Menu</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js?v=3"></script>
</body>
</html>
